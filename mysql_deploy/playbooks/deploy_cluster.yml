---
- name: Deploy MySQL Cluster
  hosts: mysql_cluster
  become: yes
  vars:
    mysql_version: "8.0"
    mysql_root_password: "secure_root_password"
    mysql_replication_user: "replicator"
    mysql_replication_password: "replication_password"
    mysql_cluster_name: "mysql_cluster"
    mysql_datadir: "/var/lib/mysql"
    mysql_port: 3306
    
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
        
    - name: Install required packages
      apt:
        name:
          - mysql-server-{{ mysql_version }}
          - mysql-client-{{ mysql_version }}
          - mysql-common
          - libmysqlclient{{ mysql_version | replace('.', '') }}-dev
          - rsync
          - percona-xtrabackup
        state: present
        
    - name: Create MySQL data directory
      file:
        path: "{{ mysql_datadir }}"
        state: directory
        owner: mysql
        group: mysql
        mode: '0755'
        
    - name: Configure MySQL server
      template:
        src: my.cnf.j2
        dest: /etc/mysql/my.cnf
        owner: root
        group: root
        mode: '0644'
      notify: Restart MySQL
        
    - name: Start MySQL service
      service:
        name: mysql
        state: started
        enabled: yes
        
    - name: Set root password
      mysql_user:
        name: root
        password: "{{ mysql_root_password }}"
        check_implicit_admin: yes
        login_user: root
        login_password: ""
        
    - name: Create replication user
      mysql_user:
        name: "{{ mysql_replication_user }}"
        password: "{{ mysql_replication_password }}"
        priv: "REPLICATION SLAVE ON *.*"
        host: '%'
        login_user: root
        login_password: "{{ mysql_root_password }}"
        
    - name: Get master status
      command: mysql -u root -p{{ mysql_root_password }} -e "SHOW MASTER STATUS;"
      register: master_status
      when: inventory_hostname in groups['mysql_masters']
      
    - name: Configure slave servers
      mysql_replication:
        mode: change_master
        master_host: "{{ item }}"
        master_user: "{{ mysql_replication_user }}"
        master_password: "{{ mysql_replication_password }}"
        master_log_file: "{{ master_status.stdout | regex_search('File: (\\S+)') | first }}"
        master_log_pos: "{{ master_status.stdout | regex_search('Position: (\\d+)') | first }}"
      loop: "{{ groups['mysql_masters'] }}"
      when: inventory_hostname in groups['mysql_slaves'] and item != inventory_hostname
      
    - name: Start slave replication
      mysql_replication:
        mode: start_slave
      when: inventory_hostname in groups['mysql_slaves']
      
    - name: Check slave status
      command: mysql -u root -p{{ mysql_root_password }} -e "SHOW SLAVE STATUS\\G;"
      register: slave_status
      when: inventory_hostname in groups['mysql_slaves']
      
    - name: Display cluster information
      debug:
        msg: "MySQL cluster deployed successfully on {{ inventory_hostname }}"
        
  handlers:
    - name: Restart MySQL
      service:
        name: mysql
        state: restarted